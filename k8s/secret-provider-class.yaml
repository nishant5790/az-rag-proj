# k8s/secret-provider-class.yaml
# Mounts Key Vault secrets as environment variables inside pods via the
# Azure Key Vault Provider for Secrets Store CSI Driver.
# Replace <TENANT_ID>, <KV_NAME>, <MI_CLIENT_ID> with actual values.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mmr-kv-secrets
  namespace: mmr
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "<MI_CLIENT_ID>"
    keyvaultName: "<KV_NAME>"
    tenantId: "<TENANT_ID>"
    objects: |
      array:
        - |
          objectName: AZURE-SEARCH-SERVICE-ENDPOINT
          objectType: secret
        - |
          objectName: AZURE-SEARCH-INDEX-NAME
          objectType: secret
        - |
          objectName: AZURE-STORAGE-ACCOUNT-NAME
          objectType: secret
        - |
          objectName: AZURE-BLOB-CONTAINER-NAME
          objectType: secret
        - |
          objectName: AZURE-OPENAI-ENDPOINT
          objectType: secret
        - |
          objectName: AZURE-OPENAI-EMBEDDING-DEPLOYMENT
          objectType: secret
        - |
          objectName: AZURE-DOCUMENT-INTELLIGENCE-ENDPOINT
          objectType: secret
        - |
          objectName: AZURE-SUBSCRIPTION-ID
          objectType: secret
        - |
          objectName: AZURE-RESOURCE-GROUP
          objectType: secret
  secretObjects:
    - secretName: mmr-secrets
      type: Opaque
      data:
        - objectName: AZURE-SEARCH-SERVICE-ENDPOINT
          key: AZURE_SEARCH_SERVICE_ENDPOINT
        - objectName: AZURE-SEARCH-INDEX-NAME
          key: AZURE_SEARCH_INDEX_NAME
        - objectName: AZURE-STORAGE-ACCOUNT-NAME
          key: AZURE_STORAGE_ACCOUNT_NAME
        - objectName: AZURE-BLOB-CONTAINER-NAME
          key: AZURE_BLOB_CONTAINER_NAME
        - objectName: AZURE-OPENAI-ENDPOINT
          key: AZURE_OPENAI_ENDPOINT
        - objectName: AZURE-OPENAI-EMBEDDING-DEPLOYMENT
          key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
        - objectName: AZURE-DOCUMENT-INTELLIGENCE-ENDPOINT
          key: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
        - objectName: AZURE-SUBSCRIPTION-ID
          key: AZURE_SUBSCRIPTION_ID
        - objectName: AZURE-RESOURCE-GROUP
          key: AZURE_RESOURCE_GROUP