# k8s/service-account.yaml
# Annotated with the User-Assigned Managed Identity client ID so that
# pods using this ServiceAccount receive a Workload Identity token.
# Replace <MI_CLIENT_ID> with the output of:
#   az identity show --name mmr-workload-identity -g $RG --query clientId -o tsv
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mmr-sa
  namespace: mmr
  annotations:
    azure.workload.identity/client-id: "<MI_CLIENT_ID>"
  labels:
    azure.workload.identity/use: "true"