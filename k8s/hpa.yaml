# k8s/hpa.yaml - Horizontal Pod Autoscaler for the FastAPI backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mmr-api-hpa
  namespace: mmr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mmr-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80